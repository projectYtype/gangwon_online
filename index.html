    const formatToLocalTime = (slotStr, offset) => {
      if (!slotStr || offset === 9) return slotStr;
      const [start, end] = slotStr.split('~').map(s => s.trim());
      
      const adjust = (timeStr) => {
        if(!timeStr) return '';
        let [h, m] = timeStr.split(':').map(Number);
        let totalMin = h * 60 + m + ((offset - 9) * 60);
        if (totalMin < 0) totalMin += 24 * 60;
        totalMin = totalMin % (24 * 60);
        const newH = Math.floor(totalMin / 60).toString().padStart(2, '0');
        const newM = (totalMin % 60).toString().padStart(2, '0');
        return `${newH}:${newM}`;
      };
      return `${adjust(start)}~${adjust(end)}`;

        const startTime = config.startTime || "10:00";
        const sessionLength = parseInt(config.sessionLength || 30);
        const sessionsPerDay = parseInt(config.sessionsPerDay || 10);
        const lunchStart = config.lunchStart; const lunchEnd = config.lunchEnd;
        const parseMin = (s) => { const [h, m] = s.split(':').map(Number); return h * 60 + m; };
        const formatMin = (m) => {
          const h = Math.floor(m / 60).toString().padStart(2, '0');
          const min = (m % 60).toString().padStart(2, '0');
          return `${h}:${min}`;
        };
        let current = parseMin(startTime);
        const lunchS = lunchStart ? parseMin(lunchStart) : -1; const lunchE = lunchEnd ? parseMin(lunchEnd) : -1;
        const slots = []; let count = 0;
        for (let i = 0; i < 50 && count < sessionsPerDay; i++) {
          let start = current; let end = current + sessionLength;
          if (lunchS !== -1 && lunchE !== -1) { if (start >= lunchS && start < lunchE) { current = lunchE; continue; } }
          slots.push(`${formatMin(start)}~${formatMin(end)}`);
          current = end; count++;
        }
        return slots;

                </div>

                <div className="flex-1 overflow-hidden bg-slate-50 rounded-xl sm:rounded-3xl border border-slate-200 shadow-inner flex items-center justify-center">
                  {driveModal.selectedLink ? (
                    <iframe src={driveModal.selectedLink} className="w-full h-full border-none rounded-xl sm:rounded-3xl" allow="autoplay"></iframe>
                  ) : (
                    <div className="w-full h-full overflow-y-auto p-5 sm:p-8 space-y-6 sm:space-y-8 custom-scrollbar">
                      {/* 기본 프로필 정보 노출 영역 */}
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex flex-col gap-4">
                          <div><span className="text-[10px] font-black text-slate-400 tracking-widest uppercase block mb-1">{t.manager}</span><p className="font-bold text-sm text-slate-800">{driveModal.profile.profileData.manager || '-'}</p></div>
                          <div><span className="text-[10px] font-black text-slate-400 tracking-widest uppercase block mb-1">{t.email}</span><p className="font-bold text-sm text-slate-800 break-all">{driveModal.profile.profileData.email || '-'}</p></div>
                          <div><span className="text-[10px] font-black text-slate-400 tracking-widest uppercase block mb-1">{t.phone}</span><p className="font-bold text-sm text-slate-800">{driveModal.profile.profileData.phone || '-'}</p></div>
                        </div>
                        <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex flex-col gap-4">
                          <div><span className="text-[10px] font-black text-slate-400 tracking-widest uppercase block mb-1">{t.websiteUrl}</span><a href={driveModal.profile.profileData.website} target="_blank" className="font-bold text-sm text-amber-600 hover:underline break-all">{driveModal.profile.profileData.website || '-'}</a></div>
                          <div><span className="text-[10px] font-black text-slate-400 tracking-widest uppercase block mb-1">{t.businessArea}</span><p className="font-bold text-sm text-slate-800">{driveModal.profile.profileData.businessArea || '-'}</p></div>
                        </div>
                      </div>

                      <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                        <span className="text-[10px] font-black text-slate-400 tracking-widest uppercase block mb-2">{t.aboutCompany}</span>
                        <p className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">{driveModal.profile.profileData.intro || '-'}</p>
                      </div>

                      <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                        <span className="text-[10px] font-black text-slate-400 tracking-widest uppercase block mb-2">{t.competitiveness}</span>
                        <p className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">{driveModal.profile.profileData.competitiveness || '-'}</p>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                          <span className="text-[10px] font-black text-slate-400 tracking-widest uppercase block mb-1.5">{t.productsInterests}</span>
                          <p className="font-bold text-sm text-slate-800">{driveModal.profile.profileData.products || '-'}</p>
                        </div>
                        <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                          <span className="text-[10px] font-black text-slate-400 tracking-widest uppercase block mb-1.5">{t.exportStatus}</span>
                          <p className="font-bold text-sm text-slate-800">{driveModal.profile.profileData.exportStatus || '-'}</p>
                        </div>
                        <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                          <span className="text-[10px] font-black text-slate-400 tracking-widest uppercase block mb-1.5">{t.targetBuyer}</span>
                          <p className="font-bold text-sm text-slate-800">{driveModal.profile.profileData.targetBuyer || '-'}</p>
                        </div>
                      </div>
                    </div>
                  )}
                </div>

                <div className="mt-4 sm:mt-8 pt-4 sm:pt-6 border-t border-slate-100 flex justify-end gap-3">
                  <button onClick={() => { setDriveModal({isOpen:false}); setApplyModal({ isOpen: true, targetId: driveModal.profile.userId, targetName: driveModal.profile.profileData.name || driveModal.profile.userId }); }} className="w-full sm:w-auto bg-slate-900 text-amber-400 px-6 sm:px-10 py-3 sm:py-4 rounded-xl sm:rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-slate-800 transition-all shadow-xl">
                    {t.requestMeeting}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* MODALS */}
          {applyModal.isOpen && (
            <div className="fixed inset-0 z-[80] flex items-center justify-center p-4 modal-overlay fade-in">
              <form onSubmit={handleApplyMeeting} className="bg-white rounded-2xl sm:rounded-[2rem] p-6 sm:p-10 w-full max-w-md shadow-2xl border border-slate-100 relative max-h-[90vh] overflow-y-auto custom-scrollbar">
                <h3 className="font-black text-xl sm:text-2xl text-slate-900 mb-5 sm:mb-8 border-b pb-4 sm:pb-6 tracking-tight">{t.requestMeeting}</h3>

               <div className="mb-5">
                  <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">날짜 선택 (Select Dates - 다중 선택 가능)</label>
                  <div className="flex flex-wrap gap-2">
                    {(() => {
                      const targetProfile = profiles.find(p => p.userId === applyModal.targetId);
                      const targetAvailableDates = targetProfile?.profileData?.availableDates || eventDates;
                      
                      return targetAvailableDates.map(date => (
                        <label key={date} className="flex items-center space-x-2 cursor-pointer bg-slate-50 border border-slate-200 px-3.5 py-2.5 rounded-xl hover:border-amber-400 hover:bg-white transition-all">
                          <input type="checkbox" name="date" value={date} className="w-4 h-4 text-amber-600 rounded focus:ring-amber-500 border-slate-300 cursor-pointer" />
                          <span className="text-xs font-bold text-slate-700">{date}</span>
                        </label>
                      ));
                    })()}
                  </div>
                </div>

                <div className="mb-5">
                  <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">{t.selectTime}</label>
                  <select name="time" required className="w-full px-4 sm:px-5 py-3 sm:py-4 bg-slate-50 border border-slate-200 rounded-xl sm:rounded-2xl text-sm font-bold focus:ring-amber-500 outline-none">
                    <option value="">{t.chooseSlot}</option>
                    {(() => {
                      const targetProfile = profiles.find(p => p.userId === applyModal.targetId);
                      const targetAvailableSlots = targetProfile?.profileData?.availableSlots || eventInfo.timeSlots || [];
                      
                      return targetAvailableSlots.map(time => (
                        <option key={time} value={time}>{formatToLocalTime(time, myOffset)}</option>
                      ));
                    })()}
                  </select>
                </div>
                <div className="mb-6 sm:mb-8">
                  <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">{t.messageOptional}</label>
                  <textarea name="message" className="w-full px-4 sm:px-5 py-3 sm:py-4 bg-slate-50 border border-slate-200 rounded-xl sm:rounded-2xl text-sm h-24 sm:text-sm focus:ring-amber-500 outline-none resize-none" placeholder={t.addBriefNote}></textarea>
                </div>
                <div className="flex gap-3 sm:gap-4">
                  <button type="button" onClick={() => setApplyModal({isOpen:false})} className="flex-1 px-4 py-3 sm:py-4 rounded-xl sm:rounded-2xl text-xs font-black text-slate-400 hover:bg-slate-50 transition-all">{t.cancel.toUpperCase()}</button>
                  <button type="submit" disabled={loading} className="flex-[2] px-4 py-3 sm:py-4 bg-slate-900 text-amber-400 rounded-xl sm:rounded-2xl text-xs font-black hover:bg-slate-800 transition-all shadow-xl">{loading ? t.sending.toUpperCase() : t.sendRequest.toUpperCase()}</button>
                </div>
              </form>
            </div>
          )}
          
          {replyModal.isOpen && (
            <div className="fixed inset-0 z-[80] flex items-center justify-center p-4 modal-overlay fade-in">
              <form onSubmit={handleReplyMeeting} className="bg-white rounded-2xl sm:rounded-[2rem] p-6 sm:p-10 w-full max-w-md shadow-2xl border border-slate-100 relative max-h-[90vh] overflow-y-auto custom-scrollbar">
                <h3 className="font-black text-xl sm:text-2xl text-slate-900 mb-1.5">{replyModal.type === 'approve' ? t.acceptRequest : replyModal.type === 'reschedule' ? t.reschedule : t.declineRequest}</h3>
                <p className="text-xs sm:text-sm text-slate-500 mb-4 sm:mb-6 border-b border-slate-100 pb-4 sm:pb-6">{replyModal.type === 'approve' ? t.acceptModalDesc : replyModal.type === 'reschedule' ? t.proposeNewTime : t.declineModalDesc}</p>
                
                {/* 🚀 승인 모달: 신청자가 제안한 날짜 중 하나를 선택 (데이터가 없으면 전체 날짜 노출) */}
                {replyModal.type === 'approve' && (
                  <div className="mb-6 sm:mb-8">
                    <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">{lang === 'ko' ? '확정할 미팅 날짜 선택' : 'Select Confirmed Date'}</label>
                    <select name="selectedConfirmDate" required className="w-full px-4 sm:px-5 py-3 sm:py-4 bg-slate-50 border border-slate-200 rounded-xl sm:rounded-2xl text-sm font-bold focus:ring-amber-500 outline-none">
                      {(() => {
                        const currentMtg = meetings.find(m => m.id === replyModal.meetingId);
                        // 무적 파서를 이용해 신청자가 제안했던 날짜만 쏙 뽑아옵니다.
                        const proposedStr = getDisplayDate(currentMtg);
                        const dateList = (proposedStr && proposedStr !== '날짜 미지정') ? proposedStr.split(',').map(d=>d.trim()) : eventDates;
                        return dateList.map(date => (
                          <option key={date} value={date}>{date}</option>
                        ));
                      })()}
                    </select>
                  </div>
                )}

                {/* 🚀 조정 모달: 날짜와 시간 모두 선택 가능하게 변경 */}
                {replyModal.type === 'reschedule' && (
                  <div className="mb-6 sm:mb-8 space-y-4 sm:space-y-6">
                    <div className="flex gap-3">
                      <div className="flex-1">
                        <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">{lang === 'ko' ? '날짜 제안' : 'Propose Date'}</label>
                        <select name="newDate" required className="w-full px-4 py-3 sm:py-4 bg-slate-50 border border-slate-200 rounded-xl sm:rounded-2xl text-sm font-bold focus:ring-amber-500 outline-none">
                          <option value="">{lang === 'ko' ? '날짜 선택' : 'Select Date'}</option>
                          {eventDates.map(date => <option key={date} value={date}>{date}</option>)}
                        </select>
                      </div>
                      <div className="flex-1">
                        <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">{t.proposedTime}</label>
                        <select name="newTime" required className="w-full px-4 py-3 sm:py-4 bg-slate-50 border border-slate-200 rounded-xl sm:rounded-2xl text-sm font-bold focus:ring-amber-500 outline-none">
                          <option value="">{t.chooseSlot}</option>
                          {eventInfo.timeSlots?.map(time => <option key={time} value={time}>{time}</option>)}
                        </select>
                      </div>
                    </div>
                    <div>
                      <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">{t.noteToSender}</label>
                      <input type="text" name="replyMessage" required placeholder="Note..." className="w-full px-4 sm:px-5 py-3 sm:py-4 bg-slate-50 border border-slate-200 rounded-xl sm:rounded-2xl text-sm font-bold focus:ring-amber-500 outline-none" />
                    </div>
                  </div>
                )}

                {replyModal.type === 'reject' && (
                  <div className="mb-6 sm:mb-8"><label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">{t.reasonOptional}</label><input type="text" name="replyMessage" placeholder={t.typeBriefReason} className="w-full px-4 sm:px-5 py-3 sm:py-4 bg-slate-50 border border-slate-200 rounded-xl sm:rounded-2xl text-sm font-bold focus:ring-amber-500 outline-none" /></div>
                )}
                
                <div className="flex gap-3 sm:gap-4"><button type="button" onClick={() => setReplyModal({isOpen:false})} className="flex-1 px-4 py-3 sm:py-4 rounded-xl sm:rounded-2xl text-xs font-black text-slate-400 hover:bg-slate-50 transition-all">{t.cancel.toUpperCase()}</button><button type="submit" disabled={loading} className={`flex-[2] px-4 py-3 sm:py-4 text-slate-900 rounded-xl sm:rounded-2xl text-xs font-black transition-all shadow-xl ${replyModal.type === 'approve' ? 'bg-green-400 hover:bg-green-500' : replyModal.type === 'reschedule' ? 'bg-amber-400 hover:bg-amber-500' : 'bg-red-400 hover:bg-red-500 text-white'}`}>{t.confirm.toUpperCase()}</button></div>
              </form>
            </div>
          )}

          {msgModal.isOpen && (
            <div className="fixed inset-0 z-[90] flex items-center justify-center p-4 modal-overlay fade-in" onClick={() => setMsgModal({ isOpen: false, text: '' })}>
               <div className="bg-white rounded-2xl sm:rounded-[2rem] p-6 sm:p-10 w-full max-w-md shadow-2xl relative" onClick={(e) => e.stopPropagation()}>
                <h3 className="font-black text-lg sm:text-xl text-slate-900 mb-4 border-b pb-3">Message Detail</h3>
                <p className="text-xs sm:text-sm text-slate-600 leading-relaxed whitespace-pre-wrap bg-slate-50 p-4 sm:p-6 rounded-xl sm:rounded-2xl border border-slate-100 min-h-[100px] max-h-[45vh] overflow-y-auto custom-scrollbar">{msgModal.text}</p>
                <div className="mt-6 flex justify-end"><button onClick={() => setMsgModal({ isOpen: false, text: '' })} className="px-6 py-2.5 bg-slate-900 text-amber-400 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-slate-800 transition-all">Close</button></div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
